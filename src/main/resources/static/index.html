<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RouteIQ Pro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1000px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin-bottom:25px;
}

.stat-card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#334155;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0ea5e9;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0284c7;
}

.result{
    margin-top:25px;
    display:none;
}

.route-box{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.distance{
    color:#38bdf8;
    font-size:20px;
    margin-bottom:10px;
}

.city{
    background:#334155;
    padding:10px;
    text-align:center;
    border-radius:10px;
    margin:8px 0;
}

.arrow{
    text-align:center;
    font-size:20px;
}

#traffic{
    margin-top:10px;
    font-weight:bold;
}

#time{
    margin-top:10px;
}

.history-box{
    margin-top:25px;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.history-box ul{
    margin-top:10px;
    padding-left:20px;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h1>🚗 RouteIQ Pro</h1>

<p class="subtitle">
Graph Based Smart Route Optimization System
</p>

<div class="stats">

<div class="stat-card">
<h3>Algorithm</h3>
<p>Dijkstra</p>
</div>

<div class="stat-card">
<h3>Database</h3>
<p>MySQL</p>
</div>

<div class="stat-card">
<h3>Backend</h3>
<p>Spring Boot</p>
</div>

</div>

<div class="form-group">
<label>Source City</label>
<input type="text" id="source" placeholder="Enter source city">
</div>

<div class="form-group">
<label>Destination City</label>
<input type="text" id="destination" placeholder="Enter destination city">
</div>

<button id="routeBtn" onclick="findRoute()">
Find Best Route
</button>

<div class="result" id="result">

<div class="route-box">

<div class="distance" id="distance"></div>

<div id="path"></div>

<div id="traffic"></div>

<div id="time"></div>

</div>

</div>

<div class="history-box">

<h3>📜 Recent Searches</h3>

<ul id="history"></ul>

</div>

<div class="footer">
Smart Route Finder using Java • Spring Boot • MySQL
</div>

</div>

</div>

<script>

let historyList = [];

function updateHistory(source,destination){

    historyList.push(source + " → " + destination);

    let html = "";

    historyList.forEach(route=>{
        html += `<li>${route}</li>`;
    });

    document.getElementById("history").innerHTML = html;
}

async function findRoute(){

    const source =
        document.getElementById("source").value;

    const destination =
        document.getElementById("destination").value;

    if(!source || !destination){
        alert("Please enter source and destination");
        return;
    }

    const btn =
        document.getElementById("routeBtn");

    btn.innerText = "Finding Route...";

    try{

        const response = await fetch(
        `http://localhost:8080/route?source=${source}&destination=${destination}`
        );

        const data = await response.json();

        document.getElementById("distance")
        .innerHTML =
        "📍 Distance : " +
        data.distance +
        " km";

        let html = "";

        data.path.forEach((city,index)=>{

            html +=
            `<div class="city">${city}</div>`;

            if(index !== data.path.length-1){

                html +=
                `<div class="arrow">⬇</div>`;
            }
        });

        document.getElementById("path")
        .innerHTML = html;

        const trafficLevel =
            Math.floor(Math.random()*3);

        let trafficText="";

        if(trafficLevel===0)
            trafficText="🟢 Low Traffic";

        else if(trafficLevel===1)
            trafficText="🟡 Moderate Traffic";

        else
            trafficText="🔴 Heavy Traffic";

        document.getElementById("traffic")
        .innerHTML = trafficText;

        document.getElementById("time")
        .innerHTML =
        "⚡ Execution Time : " +
        data.executionTime +
        " ms";

        updateHistory(source,destination);

        document.getElementById("result")
        .style.display="block";

    }catch(error){

        alert("Unable to connect to backend.");

        console.log(error);
    }

    btn.innerText = "Find Best Route";
}

</script>

</body>
</html>
